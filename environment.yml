name: irt
channels:
  - conda-forge
dependencies:
  # Core runtime
  - python=3.10
  - pip
  - numpy
  - pandas
  - xarray
  - dask
  - matplotlib

  # Geospatial stack (prefer conda-forge for GDAL/GEOS/PROJ compatibility)
  - geopandas
  - rasterio
  - shapely
  - pyproj

  # Pipeline / analytics
  - scipy
  - pyarrow

  # Tools retained under tools/
  - boto3
  - fsspec
  - s3fs
  - h5netcdf
  - h5py
  - tqdm

  # Tests (suite is the safety gate for refactors)
  - pytest

  # Pure-python app deps via pip
  - pip:
      - streamlit==1.51.0
      - streamlit-folium==0.25.3
      - folium==0.20.0
      - climate-indices
